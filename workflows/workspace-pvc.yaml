# Shared RWX workspace backed by JuiceFS.
#
# Every workflow run subPaths into this single PVC under /workspace/<workflow-name>,
# so the clone step, the run-agent pod (agent + build sidecar), and the push step
# all see the same on-disk checkout. ReadWriteMany is what lets these separate
# step pods mount it (potentially across nodes).
#
# Adjust storageClassName to match your JuiceFS StorageClass and namespace as needed.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: refactor-workspace
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: juicefs-cheap-shared
  resources:
    requests:
      storage: 50Gi
