apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: haskell-refactor
spec:
  entrypoint: refactor
  onExit: cleanup
  serviceAccountName: refactor-agent
  automountServiceAccountToken: false
  executor:
    serviceAccountName: refactor-agent

  workflowMetadata:
    labelsFrom:
      package:
        expression: "workflow.parameters.package"

  arguments:
    parameters:
      - name: package
        description: "Hackage package to refactor, e.g. heap-1.0.4 (version optional)."

      - name: base-branch
        value: ""
        description: "Upstream branch to PR against; empty = auto-detect the repo's default branch."

      - name: max-age-years
        value: "7"
        description: "Fail if the repo's last commit is older than this many years (likely abandoned)."

      - name: allow-stale
        value: "false"
        enum:
          - "true"
          - "false"
        description: "Run even if the repo is older than max-age-years (bypass the staleness check)."

      - name: pr-branch
        value: "no-return-refactor"
        description: "Branch the agent's changes are pushed to (on the fork)."

      - name: fork-org
        value: "monad-of-no-return"
        description: >-
          GitHub org to create the fork in (the token's account must be able to
          create repos there). Empty = fork into the bot user's own account.

      - name: pr-mode
        value: "skip"
        enum:
          - manual
          - auto
          - skip
        description: >-
          When to open the PR after the branch is pushed:
          manual = suspend and wait for `argo resume` (default);
          auto = open it immediately, no waiting;
          skip = never open a PR (just push the branch).

      - name: agent-image
        value: "ghcr.io/ludat/refactor-agent:latest"
        description: "Image built from agent/Dockerfile (patch set + apply/resolve script)."

      - name: build-server-image
        value: "ghcr.io/ludat/refactor-build-server:latest"
        description: "Carrier image (buildserver/Dockerfile) holding the static /execute binary."

      - name: toolchain-image
        value: "docker.io/haskell:9.14"
        description: "Stock image the build sidecar runs (cabal/ghc); swappable, no rebuild needed."

      - name: run-tests
        value: "true"
        enum:
          - "true"
          - "false"
        description: "If true, run 'cabal test all' in the sidecar after building."


  volumes:
    - name: workspace
      persistentVolumeClaim:
        claimName: refactor-workspace

  templates:
    # ─────────────────────────── DAG ───────────────────────────
    - name: refactor
      dag:
        tasks:
          - name: resolve-repo
            template: resolve-repo

          - name: clone-repo
            template: clone-repo
            depends: "resolve-repo"
            arguments:
              parameters:
                - name: repo
                  value: "{{tasks.resolve-repo.outputs.parameters.repo}}"

          - name: run-agent
            template: run-agent
            depends: "clone-repo"

          - name: push-branch
            template: push-branch
            depends: "run-agent"
            arguments:
              parameters:
                - name: repo
                  value: "{{tasks.resolve-repo.outputs.parameters.repo}}"
                - name: base-branch
                  value: "{{tasks.clone-repo.outputs.parameters.base-branch}}"

          - name: await-approval
            template: await-approval
            depends: "push-branch"
            when: >-
              '{{tasks.push-branch.outputs.parameters.changed}}' == 'true' &&
              '{{workflow.parameters.pr-mode}}' == 'manual'

          - name: open-pr
            template: open-pr
            depends: >-
              push-branch.Succeeded &&
              (await-approval.Succeeded || await-approval.Skipped || await-approval.Omitted)
            when: >-
              '{{tasks.push-branch.outputs.parameters.changed}}' == 'true' &&
              '{{workflow.parameters.pr-mode}}' != 'skip'
            arguments:
              parameters:
                - name: slug
                  value: "{{tasks.push-branch.outputs.parameters.slug}}"
                - name: fork-owner
                  value: "{{tasks.push-branch.outputs.parameters.fork-owner}}"
                - name: base-branch
                  value: "{{tasks.clone-repo.outputs.parameters.base-branch}}"
      # Bubble the compare URL up to the workflow outputs, so `argo get <wf>`
      # (and the UI's Outputs panel) show the click-to-open-PR link.
      outputs:
        parameters:
          - name: pr-url
            valueFrom:
              default: ""
              parameter: "{{tasks.push-branch.outputs.parameters.pr-url}}"

    # ─────────────────────── resolve-repo ───────────────────────
    # Hackage package -> upstream git repo URL. Uses the agent image's `resolve`
    # subcommand (fetches the package's .cabal from public Hackage, reads its
    # source-repository). No secrets, no k8s API access.
    - name: resolve-repo
      script:
        image: "{{workflow.parameters.agent-image}}"
        command: [sh]
        source: |
          set -eu
          if python3 /app/refactor.py resolve '{{workflow.parameters.package}}' --out-dir /tmp/resolve; then
            printf 'resolved upstream repo' > /tmp/description
          else
            printf 'could not resolve upstream repo (not found / non-git)' > /tmp/description
            exit 1
          fi
      outputs:
        parameters:
          - name: repo
            valueFrom:
              default: ""
              path: /tmp/resolve/repo
          - name: name
            valueFrom:
              default: ""
              path: /tmp/resolve/name
          # Global run-description: last step to write it wins; persists on failure.
          - name: description
            globalName: run-description
            valueFrom:
              default: ""
              path: /tmp/description

    # ─────────────────────── clone-repo ───────────────────────
    # Clones the upstream repo's default branch (many old Haskell repos use
    # `master`, not `main`), records that branch name for the PR base, and
    # creates the working branch.
    - name: clone-repo
      inputs:
        parameters:
          - name: repo
      volumes:
        - name: git-creds
          secret:
            secretName: git-credentials
      script:
        image: alpine/git:latest
        volumeMounts:
          - name: workspace
            mountPath: /workspace
            subPath: "{{workflow.name}}"
          - name: git-creds
            mountPath: /secrets/git
            readOnly: true
        command: [sh]
        source: |
          set -eu
          TOKEN="$(cat /secrets/git/token)"
          USERNAME="$(cat /secrets/git/username)"
          REPO='{{inputs.parameters.repo}}'
          # Rewrite https://host/path -> https://user:token@host/path without logging it.
          AUTH_URL="$(printf '%s' "$REPO" \
            | sed "s#https://#https://${USERNAME}:${TOKEN}@#")"
          rm -rf /workspace/repo

          printf 'failed to clone repo' > /tmp/description   # default until we succeed
          BASE='{{workflow.parameters.base-branch}}'
          if [ -n "$BASE" ]; then
            git clone --branch "$BASE" --depth 1 "$AUTH_URL" /workspace/repo
          else
            # No branch given: clone the repo's default branch and detect its name.
            git clone --depth 1 "$AUTH_URL" /workspace/repo
            BASE="$(git -C /workspace/repo rev-parse --abbrev-ref HEAD)"
          fi
          printf '%s' "$BASE" > /tmp/base-branch

          # Staleness gate: fail if the last commit is older than max-age-years
          # (a likely-abandoned repo), unless allow-stale=true.
          LAST_TS="$(git -C /workspace/repo log -1 --format=%ct)"   # committer date, unix epoch
          THRESHOLD_TS=$(( $(date +%s) - {{workflow.parameters.max-age-years}} * 31557600 ))
          echo "Last commit: $(git -C /workspace/repo log -1 --format=%cI)"
          if [ "$LAST_TS" -lt "$THRESHOLD_TS" ]; then
            if [ '{{workflow.parameters.allow-stale}}' = 'true' ]; then
              echo "Repo older than {{workflow.parameters.max-age-years}}y, but allow-stale=true; continuing."
            else
              printf 'last repo commit too old' > /tmp/description
              echo "Repo's last commit is older than {{workflow.parameters.max-age-years}} years; failing." >&2
              echo "Re-run with -p allow-stale=true to proceed anyway." >&2
              exit 1
            fi
          fi

          # Drop the token-bearing remote; push step sets its own authenticated remote.
          git -C /workspace/repo remote set-url origin "$REPO"
          git -C /workspace/repo checkout -b '{{workflow.parameters.pr-branch}}'
          printf 'cloned; applying diff' > /tmp/description   # overwritten by run-agent
          echo "Cloned $REPO @ $(git -C /workspace/repo rev-parse --short HEAD) (base: $BASE)"
      outputs:
        parameters:
          - name: base-branch
            valueFrom:
              path: /tmp/base-branch
          - name: description
            globalName: run-description
            valueFrom:
              default: ""
              path: /tmp/description

    # ───────────────────────── run-agent ─────────────────────────
    # Selects this package's precomputed diff from the patch set baked into the
    # image, discovers the package dir inside the checkout (handles monorepo
    # subdirs), applies the diff, then runs `cabal build` in the build sidecar
    # over localhost. No Kubernetes API access, no secrets.
    #
    # The build sidecar is a STOCK toolchain image (haskell:9.10) with the static
    # /execute server injected: an initContainer copies the binary out of the
    # carrier image onto a shared emptyDir, and the sidecar runs it. Swapping the
    # toolchain version is just a parameter change -- no image rebuild.
    - name: run-agent
      volumes:
        - name: tools
          emptyDir: {}
      initContainers:
        # Copy the static build-server binary onto the shared `tools` volume so
        # the stock toolchain sidecar can exec it.
        - name: install-build-server
          image: "{{workflow.parameters.build-server-image}}"
          command: [sh, -c, "cp /build-server /opt/tools/build-server"]
          mirrorVolumeMounts: true
      sidecars:
        - name: build-server
          image: "{{workflow.parameters.toolchain-image}}"
          command: ["/opt/tools/build-server"]
          env:
            - name: PORT
              value: "8080"
            - name: WORKDIR
              value: /workspace/repo
            # Point cabal's whole home (config + Hackage index + nix-style store)
            # at a shared PVC subpath, so the downloaded index and compiled
            # dependencies are reused across every run instead of rebuilt. The Go
            # build-server passes its env through to the cabal subprocess.
            - name: CABAL_DIR
              value: /cabal
          volumeMounts:
            - name: tools
              mountPath: /opt/tools
              readOnly: true
            - name: workspace
              mountPath: /workspace
              subPath: "{{workflow.name}}"
            # Constant subPath (NOT per-workflow), so the cache persists and is
            # shared. cleanup only clears the per-run subpath, never this one.
            - name: workspace
              mountPath: /cabal
              subPath: cabal-cache
      container:
        image: "{{workflow.parameters.agent-image}}"
        args: ["run"]
        volumeMounts:
          - name: workspace
            mountPath: /workspace
            subPath: "{{workflow.name}}"
          - name: tools
            mountPath: /opt/tools
        env:
          # Checkout root; refactor.py finds the package dir under it by .cabal
          # name and uses that path (which the sidecar mounts identically) as the
          # build cwd, so BUILD_CWD is intentionally left unset.
          - name: WORKDIR
            value: /workspace/repo
          - name: PACKAGE
            value: "{{workflow.parameters.package}}"
          - name: BUILDER_URL
            value: "http://localhost:8080"
          - name: RESULT_PATH
            value: /workspace/result.json
          - name: RUN_TESTS
            value: "{{workflow.parameters.run-tests}}"
      outputs:
        parameters:
          - name: result
            valueFrom:
              # refactor.py writes {package, matched_key, package_dir, applied,
              # build, status, diff_stat, description} here.
              default: "{}"
              path: /workspace/result.json
          # refactor.py writes a one-line outcome ("failed to compile", "tests
          # failed", "built successfully", ...) here for the run-description.
          - name: description
            globalName: run-description
            valueFrom:
              default: ""
              path: /tmp/description

    # ──────────────────────── push-branch ────────────────────────
    # Forks the upstream repo into the bot's own account and pushes the branch to
    # that fork -- but does NOT open the PR (that is a separate, manually-approved
    # step). Outputs `changed` (was there anything to push), plus the fork owner
    # and upstream slug for the open-pr step.
    - name: push-branch
      inputs:
        parameters:
          - name: repo
          - name: base-branch
      volumes:
        - name: git-creds
          secret:
            secretName: git-credentials
      script:
        image: alpine/git:latest
        volumeMounts:
          - name: workspace
            mountPath: /workspace
            subPath: "{{workflow.name}}"
          - name: git-creds
            mountPath: /secrets/git
            readOnly: true
        command: [sh]
        source: |
          set -eu
          apk add --no-cache github-cli >/dev/null 2>&1 || apk add --no-cache gh >/dev/null 2>&1
          TOKEN="$(cat /secrets/git/token)"
          USERNAME="$(cat /secrets/git/username)"
          export GH_TOKEN="$TOKEN"
          UPSTREAM='{{inputs.parameters.repo}}'         # https://github.com/owner/name
          BASE='{{inputs.parameters.base-branch}}'
          BRANCH='{{workflow.parameters.pr-branch}}'
          FORK_ORG='{{workflow.parameters.fork-org}}'   # empty = fork to the bot user
          printf 'false' > /tmp/changed        # default outputs (see valueFrom defaults)
          : > /tmp/slug; : > /tmp/fork-owner; : > /tmp/pr-url
          cd /workspace/repo

          if git diff --cached --quiet; then
            echo "No changes produced by agent; nothing to push, skipping PR."
            printf 'built, but no changes to apply' > /tmp/description
            exit 0
          fi

          git config user.name "$USERNAME"
          git config user.email "${USERNAME}@users.noreply.github.com"

          cat > /tmp/commit-msg <<'COMMIT_EOF'
          Remove noncanonical definitions.

          This appeases the `-Wnoncanonical-monad-instances` warning. A future GHC
          release will treat noncanonical definitions as errors. See
          https://github.com/haskell/core-libraries-committee/issues/328.
          COMMIT_EOF
          git commit -F /tmp/commit-msg

          # owner/name for gh commands.
          SLUG="$(printf '%s' "$UPSTREAM" | sed -E 's#https?://[^/]+/##; s#\.git$##')"
          FORK_NAME="${SLUG#*/}"
          if [ -n "$FORK_ORG" ]; then
            FORK_OWNER="$FORK_ORG"
          else
            FORK_OWNER="$(gh api user --jq .login)"
          fi
          FORK_FULL="${FORK_OWNER}/${FORK_NAME}"

          if gh repo view "$FORK_FULL" >/dev/null 2>&1; then
            echo "$FORK_FULL already exists; pushing to it."
          elif [ -n "$FORK_ORG" ]; then
            gh repo fork "$SLUG" --org "$FORK_ORG" --clone=false
          else
            gh repo fork "$SLUG" --clone=false
          fi

          # Push the branch to the fork (retry: the fork may take a moment to appear).
          FORK_URL="https://${USERNAME}:${TOKEN}@github.com/${FORK_OWNER}/${FORK_NAME}.git"
          n=0
          until git push --force "$FORK_URL" "$BRANCH"; do
            n=$((n+1)); [ "$n" -ge 5 ] && { echo "push to fork failed"; exit 1; }
            echo "fork not ready yet, retrying ($n)..."; sleep 5
          done

          # GitHub "compare" URL: opens the PR form pre-filled (base <- upstream,
          # head <- fork). Click it to open the PR yourself (e.g. in skip mode or
          # before resuming a manual run).
          PR_URL="https://github.com/${SLUG}/compare/${BASE}...${FORK_OWNER}:${BRANCH}?expand=1"

          printf '%s' "$SLUG" > /tmp/slug
          printf '%s' "$FORK_OWNER" > /tmp/fork-owner
          printf '%s' "$PR_URL" > /tmp/pr-url
          printf 'true' > /tmp/changed
          printf 'built; branch pushed to fork' > /tmp/description
          echo "Pushed ${FORK_OWNER}:${BRANCH} to fork of ${SLUG}."
          echo "==================================================================="
          echo " Open the PR:  $PR_URL"
          echo "==================================================================="
      outputs:
        parameters:
          - name: changed
            valueFrom:
              default: "false"
              path: /tmp/changed
          - name: slug
            valueFrom:
              default: ""
              path: /tmp/slug
          - name: fork-owner
            valueFrom:
              default: ""
              path: /tmp/fork-owner
          - name: pr-url
            valueFrom:
              default: ""
              path: /tmp/pr-url
          - name: description
            globalName: run-description
            valueFrom:
              default: ""
              path: /tmp/description

    # ─────────────────────── await-approval ───────────────────────
    # Manual gate: the workflow suspends here until you approve. Resume with
    #   argo resume {{workflow.name}}          (or the Resume button in the UI)
    # to open the PR; stop it with `argo stop`/`argo terminate` to leave the
    # branch pushed but never open a PR.
    - name: await-approval
      suspend: {}

    # ───────────────────────── open-pr ────────────────────────────
    # Opens the cross-fork PR against upstream. Runs only after await-approval
    # is resumed (and is skipped entirely when push-branch produced no changes).
    - name: open-pr
      inputs:
        parameters:
          - name: slug
          - name: fork-owner
          - name: base-branch
      volumes:
        - name: git-creds
          secret:
            secretName: git-credentials
      script:
        image: alpine/git:latest
        volumeMounts:
          - name: git-creds
            mountPath: /secrets/git
            readOnly: true
        command: [sh]
        source: |
          set -eu
          printf 'failed to open PR' > /tmp/description   # until gh succeeds
          apk add --no-cache github-cli >/dev/null 2>&1 || apk add --no-cache gh >/dev/null 2>&1
          export GH_TOKEN="$(cat /secrets/git/token)"
          gh pr create \
            --repo '{{inputs.parameters.slug}}' \
            --base '{{inputs.parameters.base-branch}}' \
            --head '{{inputs.parameters.fork-owner}}:{{workflow.parameters.pr-branch}}'
          printf 'PR opened' > /tmp/description
      outputs:
        parameters:
          - name: description
            globalName: run-description
            valueFrom:
              default: ""
              path: /tmp/description

    - name: cleanup
      steps:
        - - name: delete-workspace
            template: delete-workspace

    - name: delete-workspace
      script:
        image: alpine:latest
        volumeMounts:
          - name: workspace
            mountPath: /workspace
            subPath: "{{workflow.name}}"
        command: [sh]
        source: |
          set -eu
          rm -rf /workspace/repo /workspace/result.json
          echo "Cleared workspace subpath for {{workflow.name}}"
