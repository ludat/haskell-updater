# # Example secrets — DO NOT commit real tokens. Copy to secrets.yaml (gitignored),
# # fill in real values, and `kubectl apply -f secrets.yaml`. Or create them imperatively:
# #
# #   kubectl -n refactor-bot create secret generic git-credentials \
# #     --from-literal=token=ghp_xxx --from-literal=username=my-bot
# #
# # git-credentials is mounted ONLY in clone-repo, push-branch, and open-pr.
# # run-agent needs no secret at all (deterministic patch apply + sidecar build).
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: git-credentials
#   namespace: refactor-bot
# type: Opaque
# stringData:
#   # GitHub token with repo scope (clone private repos + push branch + open PR).
#   token: "REPLACE_WITH_GITHUB_TOKEN"
#   # Used for commit author + the https://<user>:<token>@github.com clone URL.
#   username: "refactor-bot"
